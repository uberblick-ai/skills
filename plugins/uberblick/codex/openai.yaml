name: uberblick
version: 1
tools:
  - name: list_workspaces
    description: List all uberblick workspaces
    parameters:
      type: object
      properties: {}
  - name: list_prds
    description: List PRDs for a workspace
    parameters:
      type: object
      properties:
        workspace_id:
          type: string
      required: [workspace_id]
  - name: list_rfcs
    description: List RFCs for a workspace
    parameters:
      type: object
      properties:
        workspace_id:
          type: string
      required: [workspace_id]
  - name: get_page
    description: Read a PRD or RFC page by UUID
    parameters:
      type: object
      properties:
        page_id:
          type: string
      required: [page_id]
  - name: get_linked_pages
    description: Get linked pages for a PRD or RFC
    parameters:
      type: object
      properties:
        id:
          type: string
          description: "Page as 'type:uuid' e.g. 'prd:019c...'"
      required: [id]
  - name: list_statuses
    description: List available statuses for a workspace
    parameters:
      type: object
      properties:
        workspace_id:
          type: string
        parent:
          type: string
          enum: [to_do, in_progress, complete]
      required: [workspace_id]
  - name: update_prd
    description: Update a PRD's content, status, or properties
    parameters:
      type: object
      properties:
        page_id:
          type: string
        content:
          type: string
        status_id:
          type: string
        completion_gate_update:
          type: object
      required: [page_id]
  - name: update_rfc
    description: Update an RFC's content, status, or properties
    parameters:
      type: object
      properties:
        page_id:
          type: string
        content:
          type: string
        status_id:
          type: string
        completion_gate_update:
          type: object
      required: [page_id]
  - name: create_comment_thread
    description: Create an anchored comment thread on a page
    parameters:
      type: object
      properties:
        page_id:
          type: string
        body:
          type: string
        selection_with_ellipsis:
          type: string
        intent:
          type: string
        decision_id:
          type: string
        blocking:
          type: boolean
      required: [page_id, body, selection_with_ellipsis]
resources:
  - uberblick://docs/workflow
  - uberblick://docs/workflow-roles
